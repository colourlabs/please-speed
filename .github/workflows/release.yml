name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install deps
        run: sudo apt install -y libcurl4-openssl-dev libssl-dev libzip-dev ninja-build meson

      - name: build
        run: |
          meson setup build --buildtype=release
          ninja -C build

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-linux
          path: build/please-speed

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install meson and ninja
        run: pip install meson ninja

      - name: cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.USERPROFILE }}/AppData/Local/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-binaries-${{ hashFiles('**/meson.build') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-binaries-

      - name: install deps via vcpkg
        run: |
          vcpkg install curl openssl --triplet=x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows
          VCPKG_DEFAULT_BINARY_CACHE: ${{ env.USERPROFILE }}/AppData/Local/vcpkg/archives
        shell: pwsh

      - name: build
        run: |
          meson setup build `
            --buildtype=release `
            --backend=ninja `
            -Dpkg_config_path="" `
            --cmake-prefix-path="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
          ninja -C build
        shell: pwsh
        
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-windows
          path: build/please-speed.exe

  build-macos-arm:
    runs-on: macos-latest # M1/M2/M3 (arm64)
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install deps
        run: brew install curl openssl libzip ninja meson

      - name: build
        run: |
          meson setup build --buildtype=release
          ninja -C build

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-macos-arm64
          path: build/please-speed

  release:
    needs: [build-linux, build-windows, build-macos-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4

      - name: rename binaries
        run: |
          mv please-speed-linux/please-speed        please-speed-linux/please-speed-linux
          mv please-speed-macos-arm64/please-speed  please-speed-macos-arm64/please-speed-macos-arm64

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            please-speed-linux/please-speed-linux
            please-speed-windows/please-speed.exe
            please-speed-macos-arm64/please-speed-macos-arm64
          generate_release_notes: true
