name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ meson ninja-build pkgconf \
            libcurl4-openssl-dev \
            libssl-dev \
            libzip-dev \
            zlib1g-dev

      - name: build
        run: |
          meson setup build --buildtype=release --prefer-static
          ninja -C build

      - name: verify
        run: |
          ldd build/please-speed
          file build/please-speed

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-linux
          path: build/please-speed

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - name: install meson and ninja
        run: pip install meson ninja
        shell: pwsh

      - name: install pkg-config
        run: choco install pkgconfiglite
        shell: pwsh

      - name: setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg ${{ github.workspace }}/vcpkg
          ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        shell: pwsh

      - name: install deps via vcpkg
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg.exe install curl openssl zlib libzip --triplet x64-windows-static
        shell: pwsh

      - name: configure build
        run: |
          meson setup build `
            --buildtype=release `
            --backend=ninja `
            -Ddefault_library=static `
            -Dpkg_config_path="$env:VCPKG_ROOT/installed/x64-windows-static/lib/pkgconfig" `
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: build
        run: ninja -C build
        shell: pwsh

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-windows
          path: build/please-speed.exe
  build-macos-arm:
    runs-on: macos-latest # M1/M2/M3 (arm64)
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install deps
        run: brew install curl openssl libzip ninja meson

      - name: build
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix curl)/lib/pkgconfig:\
          $(brew --prefix openssl)/lib/pkgconfig:\
          $(brew --prefix libzip)/lib/pkgconfig"
          meson setup build --buildtype=release --prefer-static
          ninja -C build

      - name: check static
        run: otool -L build/please-speed || true

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-macos-arm64
          path: build/please-speed

  release:
    needs: [build-linux, build-windows, build-macos-arm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4

      - name: rename binaries
        run: |
          mv please-speed-linux/please-speed        please-speed-linux/please-speed-linux
          mv please-speed-macos-arm64/please-speed  please-speed-macos-arm64/please-speed-macos-arm64

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            please-speed-linux/please-speed-linux
            please-speed-windows/please-speed.exe
            please-speed-macos-arm64/please-speed-macos-arm64
          generate_release_notes: true
